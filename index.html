// ── Storage: window.storage (compartilhado no Claude.ai) ────────────────────
const loadDB=async(k,fallback=[])=>{
  try{
    const r=await window.storage.get(k,true);
    if(r&&r.value!==undefined&&r.value!==null){
      const parsed=JSON.parse(r.value);
      return parsed;
    }
    return fallback;
  }catch(e){
    console.error("loadDB error:",e);
    return fallback;
  }
};
const saveDB=async(k,d)=>{
  try{
    await window.storage.set(k,JSON.stringify(d),true);
  }catch(e){
    console.error("saveDB error:",e);
  }
};

    reader.onload=async(ev)=>{
      try{
        const bk=JSON.parse(ev.target.result);
        if(!bk.clientes||!Array.isArray(bk.clientes)){toast_("Arquivo inválido.","error");return;}
        if(!window.confirm(`Importar ${bk.clientes.length} clientes? Os dados atuais serão substituídos.`))return;
        setDb(bk.clientes);await saveDB(SKEY,bk.clientes);
        if(bk.usuarios){setUsuarios(bk.usuarios);await saveDB(UKEY,bk.usuarios);}
        if(bk.metas){setMetas(bk.metas);await saveDB(MKEY,bk.metas);}

            const retornaHj=c.dataRetorno===hoje();

                    {retornaHj&&<span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:99,background:"#f59e0b22",color:"#f59e0b",border:"1px solid #f59e0b66"}}>📅 Retornar hoje!</span>}

                    {c.etapaProcesso&&(()=>{const et=ETAPAS.find(e=>e.v===c.etapaProcesso);return et?<span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:99,background:et.c+"22",color:et.c,border:`1px solid ${et.c}44`}}>{et.e} {et.v}</span>:null;})()}
                    {c.numInss&&<span style={{fontSize:11,color:S.text2}}>📋 INSS: {c.numInss}</span>}

                  </div>}

                ))}
              </div>
            </Field>
            <button onClick={addUser} style={{...BP,width:"100%",padding:14}}>✅ Criar Usuário</button>
          </div>}
          {adminTab==="logs"&&<div style={C}>

              <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:6}}>
                <span style={{fontSize:12,color:S.text2}}>📱 {c.telefone}</span>
                {c.cpf&&<span style={{fontSize:12,color:S.text2}}>🪪 {c.cpf}</span>}

              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <Badge text={c.fechou==="Sim"?"✅ Fechou":"❌ Não Fechou"} color={c.fechou==="Sim"?"#10b981":"#ef4444"}/>

              </div>
              <button onClick={()=>setViewRec(c)} style={{marginTop:10,width:"100%",padding:8,borderRadius:8,border:S.border,background:"transparent",color:"#60a5fa",cursor:"pointer",fontWeight:600,fontSize:12}}>👁️ Ver cadastro</button>
            </div>
          );})}

          </div>

      {viewRec&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:16}}>
        <div style={{...C,maxWidth:480,width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
          <h3 style={{margin:"0 0 16px",color:dark?"#f0f9ff":S.text}}>📋 Cadastro Existente</h3>
          <RowInfo label="Nome" value={viewRec.nome}/><RowInfo label="Telefone" value={viewRec.telefone}/>
          {viewRec.cpf&&<RowInfo label="CPF" value={viewRec.cpf}/>}
          <RowInfo label="Benefício" value={viewRec.beneficio}/>
          {viewRec.dataFechamento&&<RowInfo label="Data Fechamento" value={fmtDate(viewRec.dataFechamento)}/>}
          {viewRec.dataRetorno&&<RowInfo label="Data Retorno" value={fmtDate(viewRec.dataRetorno)}/>}
          <RowInfo label="Fechou?" value={viewRec.fechou}/><RowInfo label="Status" value={viewRec.status}/>
          {viewRec.etapaProcesso&&<RowInfo label="Etapa" value={viewRec.etapaProcesso}/>}
          {viewRec.numInss&&<RowInfo label="Nº INSS" value={viewRec.numInss}/>}
          {viewRec.numJudicial&&<RowInfo label="Nº Judicial" value={viewRec.numJudicial}/>}
          {viewRec.observacao&&<RowInfo label="Observações" value={viewRec.observacao}/>}
          {viewRec.por&&<RowInfo label="Cadastrado por" value={viewRec.por}/>}
          {viewRec.historico&&viewRec.historico.length>0&&<>
            <div style={{fontSize:12,color:S.text2,fontWeight:700,margin:"12px 0 6px",textTransform:"uppercase"}}>Histórico</div>
            {viewRec.historico.map((h,i)=><div key={i} style={{fontSize:12,color:S.text2,marginBottom:4}}>🕐 {new Date(h.quando).toLocaleString("pt-BR")} — {h.acao} por {h.por}</div>)}
          </>}
          <div style={{display:"flex",gap:10,marginTop:16}}>
            <button onClick={()=>setViewRec(null)} style={{...BS,flex:1}}>Fechar</button>
            <button onClick={()=>{setViewRec(null);doEdit(viewRec);setDupModal(null);}} style={{...BP,flex:1}}>✏️ Editar</button>
          </div>
        </div>
      </div>}

      {/* MODAL DELETE */}
      {delId&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
        <div style={{...C,maxWidth:360,width:"90%",textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
          <div style={{fontWeight:800,fontSize:18,marginBottom:8,color:dark?"#f0f9ff":S.text}}>Remover cliente?</div>
          <div style={{color:S.text2,fontSize:14,marginBottom:24}}>Esta ação remove para toda a equipe.</div>
          <div style={{display:"flex",gap:12}}>
            <button onClick={()=>setDelId(null)} style={{...BS,flex:1}}>Cancelar</button>
            <button onClick={()=>doDelete(delId)} style={{flex:1,padding:12,borderRadius:10,border:"none",cursor:"pointer",background:"#ef4444",color:"#fff",fontWeight:700}}>Remover</button>
          </div>
        </div>
      </div>}

      {/* MODAL GOOGLE AGENDA */}
      {agendaModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:460,padding:16}}>
        <div style={{background:dark?"#1e293b":"#fff",borderRadius:16,width:"100%",maxWidth:580,maxHeight:"95vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.5)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:dark?"1px solid #1e3a5f":"1px solid #e2e8f0"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#4285f4,#34a853)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>📅</div>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:dark?"#f0f9ff":"#1e293b"}}>Novo evento — Google Agenda</div>
                <div style={{fontSize:12,color:"#64748b"}}>Lead: {agendaModal.nome}</div>
              </div>
            </div>
            <button onClick={()=>{setAgendaModal(null);setAgendaSaved(null);}} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:22}}>✕</button>
          </div>
          {agendaSaved?(
            <div style={{padding:32,textAlign:"center"}}>
              {agendaSaved.existente?<>
                <div style={{fontSize:48,marginBottom:12}}>📅</div>
                <h3 style={{margin:"0 0 4px",color:"#10b981",fontWeight:800,fontSize:20}}>Evento já agendado</h3>
                <p style={{color:"#64748b",fontSize:13,marginBottom:20}}>{agendaModal.nome}</p>
                <div style={{background:dark?"#0a1628":"#f0f4f8",border:"1px solid #10b98133",borderRadius:12,padding:16,marginBottom:20,textAlign:"left"}}>
                  <div style={{fontSize:13,fontWeight:700,color:dark?"#f0f9ff":"#1e293b",marginBottom:8}}>📋 {agendaSaved.evento.titulo}</div>
                  <div style={{fontSize:12,color:"#64748b"}}>📅 {fmtDate(agendaSaved.evento.data)} às {agendaSaved.evento.hora}h</div>
                  <div style={{fontSize:11,color:"#475569",marginTop:4}}>Criado em {agendaSaved.evento.criadoEm?new Date(agendaSaved.evento.criadoEm).toLocaleString("pt-BR"):"-"}</div>
                </div>
                <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
                  {agendaSaved.link&&<a href={agendaSaved.link} target="_blank" rel="noreferrer" style={{padding:"11px 18px",borderRadius:10,background:"linear-gradient(135deg,#4285f4,#34a853)",color:"#fff",fontWeight:700,fontSize:14,textDecoration:"none"}}>🔗 Abrir no Google Agenda</a>}
                  <button onClick={async()=>{await deletarAgendamento(agendaModal.id,agendaSaved.evento);setAgendaSaved(null);setAgendaModal(null);}} style={{padding:"11px 18px",borderRadius:10,border:"1px solid #ef444433",background:"transparent",color:"#f87171",cursor:"pointer",fontWeight:600,fontSize:13}}>🗑️ Excluir agendamento</button>
                </div>
                <button onClick={()=>setAgendaSaved(null)} style={{marginTop:12,background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:13,textDecoration:"underline"}}>+ Criar novo agendamento</button>
              </>:<>
                <div style={{fontSize:56,marginBottom:16}}>🎉</div>
                <h3 style={{margin:"0 0 8px",color:"#10b981",fontWeight:800,fontSize:20}}>Evento criado!</h3>
                <p style={{color:"#64748b",fontSize:13,marginBottom:24}}>O evento foi adicionado ao seu Google Agenda.</p>
                {agendaSaved.link&&<a href={agendaSaved.link} target="_blank" rel="noreferrer" style={{display:"inline-flex",alignItems:"center",gap:8,padding:"12px 20px",borderRadius:10,background:"linear-gradient(135deg,#4285f4,#34a853)",color:"#fff",fontWeight:700,fontSize:14,textDecoration:"none",marginBottom:16}}>🔗 Abrir no Google Agenda</a>}
              </>}
              <div><button onClick={()=>{setAgendaModal(null);setAgendaSaved(null);}} style={{...BS,marginTop:8}}>Fechar</button></div>
            </div>
          ):(
            <div style={{padding:20}}>
              <input style={{width:"100%",padding:"12px 4px",fontSize:22,fontWeight:700,border:"none",borderBottom:dark?"1px solid #1e3a5f":"1px solid #e2e8f0",background:"transparent",color:dark?"#f0f9ff":"#1e293b",outline:"none",marginBottom:20,boxSizing:"border-box"}} placeholder="Adicionar título" value={agendaForm.titulo} onChange={e=>setAgendaForm({...agendaForm,titulo:e.target.value})}/>
              <div style={{display:"flex",gap:12,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18}}>🕐</span><input type="date" style={{padding:"8px 12px",borderRadius:8,border:dark?"1px solid #1e3a5f":"1px solid #e2e8f0",background:dark?"#0a1628":"#f8fafc",color:dark?"#e2e8f0":"#1e293b",fontSize:14,outline:"none"}} value={agendaForm.data} onChange={e=>setAgendaForm({...agendaForm,data:e.target.value})}/></div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <input type="time" style={{padding:"8px 10px",borderRadius:8,border:dark?"1px solid #1e3a5f":"1px solid #e2e8f0",background:dark?"#0a1628":"#f8fafc",color:dark?"#e2e8f0":"#1e293b",fontSize:14,outline:"none"}} value={agendaForm.horaIni} onChange={e=>setAgendaForm({...agendaForm,horaIni:e.target.value})}/>
                  <span style={{color:"#64748b"}}>–</span>
                  <input type="time" style={{padding:"8px 10px",borderRadius:8,border:dark?"1px solid #1e3a5f":"1px solid #e2e8f0",background:dark?"#0a1628":"#f8fafc",color:dark?"#e2e8f0":"#1e293b",fontSize:14,outline:"none"}} value={agendaForm.horaFim} onChange={e=>setAgendaForm({...agendaForm,horaFim:e.target.value})}/>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,padding:"10px 14px",borderRadius:10,border:dark?"1px solid #1e3a5f":"1px solid #e2e8f0",cursor:"pointer",background:agendaForm.meet?"rgba(66,133,244,0.08)":"transparent"}} onClick={()=>setAgendaForm({...agendaForm,meet:!agendaForm.meet})}>
                <div style={{width:20,height:20,borderRadius:4,border:agendaForm.meet?"none":"2px solid #64748b",background:agendaForm.meet?"#4285f4":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{agendaForm.meet&&<span style={{color:"#fff",fontSize:13,fontWeight:900}}>✓</span>}</div>
                <span style={{fontSize:13,color:dark?"#e2e8f0":"#1e293b",fontWeight:agendaForm.meet?700:400}}>📹 Adicionar videochamada Google Meet</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}><span style={{fontSize:18,flexShrink:0}}>📍</span><input style={{flex:1,padding:"10px 12px",borderRadius:8,border:dark?"1px solid #1e3a5f":"1px solid #e2e8f0",background:dark?"#0a1628":"#f8fafc",color:dark?"#e2e8f0":"#1e293b",fontSize:14,outline:"none"}} placeholder="Adicionar local" value={agendaForm.local} onChange={e=>setAgendaForm({...agendaForm,local:e.target.value})}/></div>
              <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:16}}>
                <span style={{fontSize:18,flexShrink:0,marginTop:10}}>👥</span>
                <div style={{flex:1}}>
                  <textarea style={{width:"100%",padding:"10px 12px",borderRadius:8,border:dark?"1px solid #1e3a5f":"1px solid #e2e8f0",background:dark?"#0a1628":"#f8fafc",color:dark?"#e2e8f0":"#1e293b",fontSize:14,outline:"none",resize:"vertical",minHeight:70,fontFamily:"inherit",boxSizing:"border-box"}} placeholder="Adicionar convidados (e-mails separados por vírgula)" value={agendaForm.convidados} onChange={e=>setAgendaForm({...agendaForm,convidados:e.target.value})}></textarea>
                  <div style={{fontSize:11,color:"#64748b",marginTop:4}}>Ex: joao@email.com, maria@email.com</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:16}}><span style={{fontSize:18,flexShrink:0,marginTop:10}}>📝</span><textarea style={{flex:1,padding:"10px 12px",borderRadius:8,border:dark?"1px solid #1e3a5f":"1px solid #e2e8f0",background:dark?"#0a1628":"#f8fafc",color:dark?"#e2e8f0":"#1e293b",fontSize:14,outline:"none",resize:"vertical",minHeight:80,fontFamily:"inherit"}} placeholder="Adicionar descrição" value={agendaForm.descricao} onChange={e=>setAgendaForm({...agendaForm,descricao:e.target.value})}></textarea></div>
              <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>🔔</span><select style={{padding:"8px 10px",borderRadius:8,border:dark?"1px solid #1e3a5f":"1px solid #e2e8f0",background:dark?"#0a1628":"#f8fafc",color:dark?"#e2e8f0":"#1e293b",fontSize:13,outline:"none"}} value={agendaForm.lembrete} onChange={e=>setAgendaForm({...agendaForm,lembrete:parseInt(e.target.value)})}>
                  <option value={5}>5 min antes</option><option value={10}>10 min antes</option><option value={15}>15 min antes</option><option value={30}>30 min antes</option><option value={60}>1 hora antes</option><option value={120}>2 horas antes</option><option value={1440}>1 dia antes</option>
                </select></div>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>🎨</span><select style={{padding:"8px 10px",borderRadius:8,border:dark?"1px solid #1e3a5f":"1px solid #e2e8f0",background:dark?"#0a1628":"#f8fafc",color:dark?"#e2e8f0":"#1e293b",fontSize:13,outline:"none"}} value={agendaForm.cor} onChange={e=>setAgendaForm({...agendaForm,cor:e.target.value})}>
                  <option value="7">🔵 Pavão (Azul)</option><option value="2">🟢 Sálvia</option><option value="10">🌿 Manjericão</option><option value="1">💜 Lavanda</option><option value="3">🍇 Uva</option><option value="4">🌸 Flamingo</option><option value="6">🍊 Tangerina</option><option value="5">🍌 Banana</option><option value="11">🍅 Tomate</option><option value="8">⬛ Grafite</option>
                </select></div>
              </div>
              <div style={{display:"flex",justifyContent:"flex-end",gap:10,paddingTop:16,borderTop:dark?"1px solid #1e3a5f":"1px solid #e2e8f0"}}>
                <button onClick={()=>{setAgendaModal(null);setAgendaSaved(null);}} style={{padding:"10px 20px",borderRadius:8,border:dark?"1px solid #1e3a5f":"1px solid #e2e8f0",background:"transparent",color:"#64748b",cursor:"pointer",fontWeight:600,fontSize:14}}>Cancelar</button>
                <button onClick={criarEvento} disabled={agendaSaving} style={{padding:"10px 24px",borderRadius:8,border:"none",cursor:agendaSaving?"not-allowed":"pointer",background:"linear-gradient(135deg,#4285f4,#34a853)",color:"#fff",fontWeight:700,fontSize:14,opacity:agendaSaving?0.7:1}}>
                  {agendaSaving?"⏳ Criando...":"📅 Salvar evento"}
                </button>
              </div>
            </div>
          )}
        </div>
      </div>}

      {/* MODAL ANOTAÇÕES */}
      {anotaModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:450,padding:16}}>
        <div style={{...C,maxWidth:520,width:"100%",maxHeight:"90vh",display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div><h3 style={{margin:0,color:dark?"#f0f9ff":S.text,fontSize:18}}>💬 Anotações</h3><p style={{margin:"4px 0 0",fontSize:13,color:S.text2}}>{anotaModal.nome} · {anotaModal.telefone}</p></div>
            <button onClick={()=>setAnotaModal(null)} style={{background:"none",border:"none",color:S.text2,cursor:"pointer",fontSize:22,lineHeight:1}}>✕</button>
          </div>
          <div style={{flex:1,overflowY:"auto",marginBottom:16,display:"flex",flexDirection:"column",gap:10}}>
            {(!anotaModal.anotacoes||anotaModal.anotacoes.length===0)&&<div style={{textAlign:"center",padding:"32px 0",color:S.text2}}><div style={{fontSize:36,marginBottom:8}}>💬</div><p style={{margin:0,fontSize:13}}>Nenhuma anotação ainda.</p></div>}
            {(anotaModal.anotacoes||[]).map((a,i)=>(
              <div key={i} style={{background:dark?"#0a1628":"#f0f4f8",border:S.border,borderRadius:12,padding:"12px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,color:dark?"#e2e8f0":S.text,lineHeight:1.5,marginBottom:6}}>{a.texto}</div>
                    <div style={{display:"flex",gap:10,fontSize:11,color:S.text2}}><span>👤 {a.por}</span><span>🕐 {new Date(a.quando).toLocaleString("pt-BR")}</span></div>
                  </div>
                  {(session?.role==="admin"||a.por===session?.nome)&&<button onClick={()=>deletarAnota(anotaModal.id,i)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:16,padding:0,flexShrink:0}}>🗑️</button>}
                </div>
              </div>
            ))}
          </div>
          <div style={{borderTop:S.border,paddingTop:16}}>
            <textarea style={{...I,minHeight:80,resize:"none",fontFamily:"inherit",marginBottom:10}} placeholder="Digite sua anotação... (Ctrl+Enter para salvar)" value={anotaTexto} onChange={e=>setAnotaTexto(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&e.ctrlKey)salvarAnota();}}></textarea>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <span style={{fontSize:11,color:S.text2,flex:1}}>Ctrl+Enter para salvar</span>
              <button onClick={()=>setAnotaModal(null)} style={{...BS,padding:"10px 16px"}}>Fechar</button>
              <button onClick={salvarAnota} disabled={!anotaTexto.trim()} style={{padding:"10px 20px",borderRadius:10,border:"none",cursor:anotaTexto.trim()?"pointer":"not-allowed",background:anotaTexto.trim()?"linear-gradient(135deg,#a78bfa,#7c3aed)":"#1e3a5f",color:"#fff",fontWeight:700,fontSize:14,opacity:anotaTexto.trim()?1:0.5}}>💬 Salvar</button>
            </div>
          </div>
        </div>
      </div>}

      {/* MODAL CSV */}
      {csvModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,padding:16}}>
        <div style={{...C,maxWidth:680,width:"100%",maxHeight:"90vh",display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div><h3 style={{margin:0,color:dark?"#f0f9ff":S.text,fontSize:18}}>📊 Dados para Google Sheets</h3><p style={{margin:"4px 0 0",fontSize:12,color:S.text2}}>{rows.length} registros · Copie e cole no Google Sheets</p></div>
            <button onClick={()=>setCsvModal(null)} style={{background:"none",border:"none",color:S.text2,cursor:"pointer",fontSize:22}}>✕</button>
          </div>
          <div style={{background:dark?"#0a1628":"#f0f4f8",border:S.border,borderRadius:10,padding:4,flex:1,overflow:"hidden",display:"flex",flexDirection:"column",marginBottom:16}}>
            <textarea id="csv-textarea" readOnly value={csvModal} style={{flex:1,width:"100%",minHeight:240,background:"transparent",border:"none",color:S.text2,fontSize:11,fontFamily:"monospace",resize:"none",outline:"none",padding:12,boxSizing:"border-box"}}></textarea>
          </div>
          <div style={{background:dark?"#0d2137":"#e2e8f0",border:"1px solid #b8975a33",borderRadius:10,padding:"12px 16px",marginBottom:16}}>
            <p style={{margin:0,fontSize:12,color:"#b8975a",fontWeight:600}}>📌 Google Sheets: Abra → célula A1 → Cole (Ctrl+V) → pronto! ✅</p>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setCsvModal(null)} style={{...BS,flex:1}}>Fechar</button>
            <button onClick={copiarCSV} style={{flex:2,padding:"13px",borderRadius:10,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#10b981,#06b6d4)",color:"#fff",fontWeight:800,fontSize:15}}>📋 Copiar tudo (Ctrl+C)</button>
          </div>
        </div>
      </div>}

      <style>{"@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap');*{box-sizing:border-box}input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5)}@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}select option{background:#1e293b;color:#e2e8f0}textarea{display:block}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#b8975a55;border-radius:99px}"}</style>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
